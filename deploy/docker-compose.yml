services:
  bookshelf-api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: home-bookshelf-api
    restart: unless-stopped
    ports:
      - "${BOOKSHELF_BIND:-127.0.0.1:8000}:8000"
    volumes:
      - ${BOOKSHELF_DATA_DIR:-../data}:/data
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////data/bookshelf.db
      DATA_DIR: /data
      PORT: "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
